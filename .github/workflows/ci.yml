name: Java CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: mvn -B clean compile --file pom.xml

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        run: mvn -B test --file pom.xml

  smoke-test:
    name: Smoke test application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Start application and run smoke tests
        run: |
          nohup mvn spring-boot:run -Dspring-boot.run.jvmArguments="-Dserver.port=8080" > app.log 2>&1 &
          APP_PID=$!
          echo "App PID: $APP_PID"

          sleep 25

          curl -f http://localhost:8080/actuator/health || (cat app.log && exit 1)
          curl -f http://localhost:8080/api/factions || (cat app.log && exit 1)

          kill $APP_PID || true

  package:
    name: Package application
    runs-on: ubuntu-latest
    needs: smoke-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Package application
        run: mvn -B package --file pom.xml