spring:
  application:
    name: roster-builder-api

  datasource:
    url: jdbc:h2:mem:rosterdb
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  h2:
    console:
      enabled: true
      settings:
        web-allow-others: true

  security:
    user:
      name: admin
      password: admin

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings